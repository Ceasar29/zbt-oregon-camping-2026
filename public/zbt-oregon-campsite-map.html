<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZBT Campsites D24 and D25 Map</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17211b;
      background: #f8f7f1;
    }
    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 14px;
      color: #58675d;
    }
    .map-frame {
      position: relative;
      width: 100%;
      overflow: visible;
      border: 1px solid #d7ded3;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 14px 30px rgba(23, 33, 27, .12);
    }
    .map-canvas {
      position: relative;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    .target {
      position: absolute;
      left: 43.3%;
      top: 7.8%;
      width: 5.2%;
      height: 9.5%;
      border: 6px solid #e23d28;
      border-radius: 999px;
      box-shadow: 0 0 0 7px rgba(255, 211, 84, .92), 0 0 0 14px rgba(226, 61, 40, .28);
      pointer-events: none;
    }
    .pin {
      position: absolute;
      left: 48.8%;
      top: 7.1%;
      transform: translate(-8px, -100%);
      min-width: 186px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #17211b;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0, 0, 0, .22);
    }
    .pin::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: -10px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid #17211b;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      color: #58675d;
      font-size: 14px;
    }
    .legend strong {
      color: #17211b;
    }
    @media (max-width: 640px) {
      .wrap {
        width: calc(100% - 18px);
        padding-top: 10px;
      }
      .map-frame {
        max-height: 78vh;
      }
      .pin {
        min-width: 154px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Our Sites: D24 + D25</h1>
    <p>Loop D is at the top of the campground map. D24 and D25 are side-by-side near the Lost Creek Reservoir edge.</p>
    <div class="map-frame" aria-label="Official Joseph H Stewart campground map with D24 and D25 highlighted">
      <div class="map-canvas">
        <img src="assets/zbt-oregon/joseph-stewart-layout.png" alt="Official Joseph H Stewart County Park campground map">
        <div class="target" aria-hidden="true"></div>
        <div class="pin">ZBT sites<br>D24 + D25</div>
      </div>
    </div>
    <div class="legend">
      <span><strong>D24:</strong> full shade, 12' x 12' tent pad</span>
      <span><strong>D25:</strong> partial shade, 12' x 12' tent pad</span>
      <span><strong>Map source:</strong> Jackson County Parks campground brochure</span>
    </div>
  </main>
</body>
</html>
